<head>

<title>Pomodoro Timer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f0f2f5; --fg:#111; --muted:#888; --case:#0d0d0d;
  --face:#fff; --red:#ea3323; --green:#22c55e;
  --tmaj:#111; --tmin:#b0b0b0; --knob:#fff;
  --surface:#e4e4e7; --surfh:#d4d4d8;
  --card:#fff; --border:#d1d5db;
  --grid:#e2e5ea;
  --ease:cubic-bezier(.25,1,.5,1);
}
body.dark{
  --bg:#111; --fg:#f4f4f5; --muted:#71717a;
  --case:#000; --face:#27272a; --red:#ef4444;
  --tmaj:#f4f4f5; --tmin:#52525b; --knob:#3f3f46;
  --surface:#27272a; --surfh:#3f3f46;
  --card:#1c1c1f; --border:#3f3f46;
  --grid:#2a2d33;
}

body{
  background:var(--bg); color:var(--fg);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:0 20px 64px;
  transition:background .28s,color .28s;
  user-select:none; -webkit-tap-highlight-color:transparent;
}

/* ── Top bar ── */
.topbar{
  width:100%; max-width:520px;
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 0 14px;
}
.corner{
  background:none;
  border:1.5px solid rgba(128,128,128,.28);
  color:var(--muted);
  padding:9px 18px;
  border-radius:999px;
  font:600 13px/1 'Inter',sans-serif;
  cursor:pointer;
  white-space:nowrap;
  transition:border-color .2s,color .2s,background .2s;
  flex-shrink:0;
}
.corner:hover{border-color:var(--fg);color:var(--fg);}
.corner.muted{opacity:.38;border-style:dashed;}

/* ── Pomo sub-info ── */
.pomo-info{
  display:flex; flex-direction:column; align-items:center; gap:6px;
  margin-bottom:8px; min-height:28px;
}
.mode-lbl{
  font:700 10px/1 'Inter',sans-serif;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--muted);
}
.mode-lbl.brk{color:#16a34a;}
body.dark .mode-lbl.brk{color:#86efac;}
.dots{display:none;gap:9px;align-items:center;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s;}
.dot.done{background:var(--red);}
.dot.cur{background:var(--fg);transform:scale(1.4);}

/* ── Clock ── */
.clock-wrap{
  position:relative;
  width:min(480px,calc(100vw - 28px));
  aspect-ratio:1;
  margin-bottom:24px;
}
.clock{
  width:100%; height:100%;
  background:var(--face);
  border:24px solid var(--case);
  border-radius:22%;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.18),
    inset 0 0 0 5px rgba(0,0,0,.4),
    inset 0 6px 18px rgba(0,0,0,.10),
    0 32px 64px rgba(0,0,0,.2),
    0 6px 16px rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;
  cursor:grab; position:relative;
  transition:background .28s,border-color .28s;
}
.clock:active{cursor:grabbing;}
svg{width:100%;height:100%;overflow:visible;}
.slice{fill:var(--red);transition:fill .3s;}
.slice.brk{fill:var(--green);}
line.maj{stroke:var(--tmaj);stroke-width:3.5;stroke-linecap:round;}
line.min{stroke:var(--tmin);stroke-width:2;stroke-linecap:round;}
text.lbl{
  font:700 15px 'Inter',sans-serif;
  fill:var(--fg);text-anchor:middle;dominant-baseline:central;
  pointer-events:none; transition:fill .28s;
}
.knob{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:60px;height:60px;
  background:var(--knob);border-radius:50%;
  pointer-events:none;
  box-shadow:0 6px 16px rgba(0,0,0,.2),0 0 0 1px rgba(0,0,0,.06),inset 0 2px 6px rgba(255,255,255,.9);
  display:flex;justify-content:center;
  transition:background .28s;
}
.knob-mark{width:6px;height:15px;background:var(--muted);border-radius:3px;margin-top:8px;}

/* ── Controls ── */
.controls{
  display:flex; align-items:center; gap:14px;
  margin-bottom:14px;
  width:min(480px,calc(100vw - 28px));
}
.btn{
  flex:1; border:none;
  padding:16px 0;
  font:700 14px/1 'Inter',sans-serif;
  border-radius:999px; cursor:pointer; min-width:0;
  transition:all .22s var(--ease);
  background:var(--surface); color:var(--fg);
}
.btn:hover{background:var(--surfh);}
.btn:active{transform:scale(.95);}
.btn-start{background:#bbf7d0;color:#14532d;box-shadow:0 2px 10px rgba(34,197,94,.18);}
.btn-start:hover{background:#86efac;}
.btn-start.on{background:#ef4444;color:#fff;box-shadow:0 4px 18px rgba(239,68,68,.32);}
.btn-start.on:hover{background:#dc2626;}

.time-group{
  display:flex; align-items:center; gap:11px; flex-shrink:0;
}
.digital{
  font:800 40px/1 'Inter',sans-serif;
  font-variant-numeric:tabular-nums;
  letter-spacing:-.03em; color:var(--fg);
  min-width:118px; text-align:center;
  transition:color .28s;
}
.adj{
  width:44px;height:44px;border-radius:50%;
  border:2px solid rgba(128,128,128,.25);
  background:none; color:var(--fg);
  font-size:22px;font-weight:300;line-height:1;
  cursor:pointer; display:flex;align-items:center;justify-content:center;
  transition:all .22s var(--ease); flex-shrink:0;
}
.adj:hover{border-color:var(--fg);background:var(--fg);color:var(--bg);}
.adj:active{transform:scale(.88);}

/* ── Pomodoro button ── */
.pomo-row{
  width:min(480px,calc(100vw - 28px));
  display:flex; justify-content:center;
  margin-bottom:28px;
}
.pomo-btn{
  padding:10px 28px;
  background:none;
  border:1.5px solid var(--border);
  border-radius:999px;
  color:var(--muted);
  font:600 13px/1 'Inter',sans-serif;
  cursor:pointer;
  letter-spacing:.02em;
  transition:all .22s var(--ease);
  display:flex; align-items:center; gap:7px;
}
.pomo-btn:hover{border-color:var(--fg);color:var(--fg);}
.pomo-btn.on{
  background:var(--fg);border-color:var(--fg);color:var(--bg);
  box-shadow:0 4px 14px rgba(0,0,0,.13);
}
.pomo-btn .pip{
  width:7px;height:7px;border-radius:50%;
  background:var(--red);opacity:.6;
  transition:opacity .2s;
}
.pomo-btn.on .pip{opacity:1;background:#fff;}

/* ══ TODOS SECTION ══ */
.todos{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px;}

/* ── Progress bar ── */
.prog-wrap{
  display:flex; flex-direction:column; gap:7px;
}
.prog-row{
  display:flex; justify-content:space-between; align-items:center;
}
.prog-lbl{
  font:700 10px/1 'Inter',sans-serif;
  letter-spacing:.12em; text-transform:uppercase;
  color:var(--muted);
}
.prog-val{
  font:700 11px/1 'Inter',sans-serif;
  color:var(--fg); font-variant-numeric:tabular-nums;
}
.prog-track{
  height:6px; background:var(--border);
  border-radius:999px; overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  border-radius:999px;
  width:0%;
  transition:width .55s var(--ease);
}

/* ── Stage header ── */
.stage-header{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border:1px solid var(--grid);
  border-radius:10px;
  overflow:hidden;
  background:var(--card);
}
.sh-cell{
  padding:8px 10px;
  border-right:1px solid var(--grid);
  display:flex; flex-direction:column; gap:3px;
  cursor:pointer;
  transition:background .18s;
}
.sh-cell:last-child{border-right:none;}
.sh-cell:hover{background:var(--surface);}
.sh-cell.active-filter{background:var(--surface);}
.sh-top{
  display:flex; align-items:center; gap:5px;
}
.sh-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--muted); opacity:.5;
}
.sh-cell:nth-child(1) .sh-dot{background:#ea3323;}
.sh-cell:nth-child(2) .sh-dot{background:#f97316;}
.sh-cell:nth-child(3) .sh-dot{background:#22c55e;}
.sh-cell:nth-child(4) .sh-dot{background:#6366f1;}
.sh-name{
  font:700 10px/1 'Inter',sans-serif;
  letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted);
}
.sh-cnt{
  font:700 16px/1 'Inter',sans-serif;
  color:var(--fg);
  padding-left:11px;
}
.sh-cell:nth-child(1) .sh-cnt{color:#ea3323;}
.sh-cell:nth-child(2) .sh-cnt{color:#f97316;}
.sh-cell:nth-child(3) .sh-cnt{color:#22c55e;}
.sh-cell:nth-child(4) .sh-cnt{color:#6366f1;}

/* ── Input ── */
.todo-in{
  width:100%; padding:15px 18px;
  font:400 15px/1 'Inter',sans-serif;
  border:1.5px solid var(--border); border-radius:13px;
  background:var(--card); color:var(--fg); outline:none;
  transition:border-color .22s,box-shadow .22s;
}
.todo-in::placeholder{color:var(--muted);}
.todo-in:focus{border-color:var(--red);box-shadow:0 4px 16px rgba(234,51,35,.10);}

/* ── Todo list ── */
.list{list-style:none;display:flex;flex-direction:column;gap:8px;}

/* Stage badge colors */
.badge{
  font:700 9px/1 'Inter',sans-serif;
  letter-spacing:.08em; text-transform:uppercase;
  padding:3px 7px; border-radius:999px;
  flex-shrink:0;
  transition:all .2s;
}
.badge.s0{background:rgba(234,51,35,.10);color:#ea3323;}
.badge.s1{background:rgba(249,115,22,.12);color:#ea580c;}
.badge.s2{background:rgba(34,197,94,.12);color:#15803d;}
body.dark .badge.s2{color:#4ade80;}

/* Item */
.item{
  display:flex;align-items:center;gap:10px;
  padding:12px 15px; border-radius:11px;
  background:var(--card); border:1px solid transparent;
  box-shadow:0 2px 6px rgba(0,0,0,.025);
  transition:all .2s;
  cursor:pointer;
}
.item:hover{border-color:var(--border);transform:translateY(-1px);box-shadow:0 5px 14px rgba(0,0,0,.06);}
.item.stage-2{opacity:.7;}

/* stage indicator stripe */
.item::before{
  content:'';
  width:3px; height:100%;
  border-radius:2px;
  flex-shrink:0;
  align-self:stretch;
  transition:background .2s;
}
.item.stage-0::before{background:#ea3323;}
.item.stage-1::before{background:#f97316;}
.item.stage-2::before{background:#22c55e;}

.itxt{flex:1;font-size:15px;color:var(--fg);line-height:1.4;}
.item.stage-2 .itxt{text-decoration:line-through;color:var(--muted);}

/* advance btn */
.adv-btn{
  background:none; border:1px solid var(--border);
  color:var(--muted); border-radius:6px;
  font:600 11px/1 'Inter',sans-serif;
  padding:4px 8px; cursor:pointer; flex-shrink:0;
  transition:all .15s;
  white-space:nowrap;
}
.adv-btn:hover{border-color:var(--fg);color:var(--fg);}
.item.stage-2 .adv-btn{display:none;}

.del{
  background:none;border:none;color:var(--muted);
  font-size:20px;cursor:pointer;opacity:0;
  padding:2px 5px;border-radius:5px;transition:all .18s;
}
.item:hover .del{opacity:1;}
.del:hover{color:var(--red);}

/* Flash animation for timer events */
@keyframes flash-ok{
  0%{background:rgba(34,197,94,.22);}
  100%{background:var(--card);}
}
.item.flash{animation:flash-ok .65s var(--ease);}

/* hidden by filter */
.item.hidden{display:none;}

@media(max-width:500px){
  body{padding:0 14px 56px;}
  .topbar{padding:14px 0 10px;}
  .corner{font-size:12px;padding:8px 14px;}
  .controls{gap:9px;margin-bottom:10px;}
  .btn{padding:13px 0;font-size:13px;}
  .digital{font-size:32px;min-width:96px;}
  .adj{width:38px;height:38px;font-size:18px;}
  .del{opacity:.35;}
}
@media(max-width:360px){
  .digital{font-size:27px;min-width:84px;}
  .adj{width:33px;height:33px;font-size:16px;}
  .btn{padding:11px 0;font-size:12px;}
}
</style>
</head>
<body>

<div class="topbar">
  <button class="corner" id="soundBtn">🔔 알람</button>
  <button class="corner" id="themeBtn">Dark Mode</button>
</div>

<div class="pomo-info">
  <div class="mode-lbl" id="modeLbl"></div>
  <div class="dots" id="dotsEl">
    <div class="dot cur" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
</div>

<div class="clock-wrap">
  <div class="clock" id="clock">
    <svg viewBox="0 0 240 240">
      <path class="slice" id="sliceEl" d=""></path>
      <g id="ticks"></g>
    </svg>
    <div class="knob" id="knob"><div class="knob-mark"></div></div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-start" id="startBtn">START</button>
  <div class="time-group">
    <button class="adj" id="minusBtn">−</button>
    <div class="digital" id="digi">25:00</div>
    <button class="adj" id="plusBtn">+</button>
  </div>
  <button class="btn" id="resetBtn">RESET</button>
</div>

<div class="pomo-row">
  <button class="pomo-btn" id="pomoBtn">
    <span class="pip"></span>
    🍅 뽀모도로 모드
  </button>
</div>

<!-- Todos -->
<div class="todos">

  <!-- Progress bar -->
  <div class="prog-wrap">
    <div class="prog-row">
      <span class="prog-lbl">목표 달성률</span>
      <span class="prog-val" id="progVal">0 / 0</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <!-- Stage header — click to filter -->
  <div class="stage-header">
    <div class="sh-cell" data-filter="0">
      <div class="sh-top"><span class="sh-dot"></span><span class="sh-name">집중</span></div>
      <div class="sh-cnt" id="cnt0">0</div>
    </div>
    <div class="sh-cell" data-filter="1">
      <div class="sh-top"><span class="sh-dot"></span><span class="sh-name">진행</span></div>
      <div class="sh-cnt" id="cnt1">0</div>
    </div>
    <div class="sh-cell" data-filter="2">
      <div class="sh-top"><span class="sh-dot"></span><span class="sh-name">완료</span></div>
      <div class="sh-cnt" id="cnt2">0</div>
    </div>
    <div class="sh-cell" data-filter="all">
      <div class="sh-top"><span class="sh-dot"></span><span class="sh-name">전체</span></div>
      <div class="sh-cnt" id="cntAll">0</div>
    </div>
  </div>

  <!-- Input -->
  <input class="todo-in" id="todoIn" placeholder="이번 뽀모도로에 집중할 목표 입력...">

  <!-- List -->
  <ul class="list" id="todoList"></ul>

</div>

<script>
/* ══ Audio ══ */
const ALARM_SRC="https://raw.githubusercontent.com/anonym2008/pomodoro-timer/main/%EC%82%90%EC%82%90%EC%82%90.mp3";
const DIAL_SRC ="https://raw.githubusercontent.com/anonym2008/pomodoro-timer/main/%5Bcut_1sec%5D.mp3";
const alarm=new Audio(ALARM_SRC); alarm.loop=true;
const pool=Array.from({length:4},()=>{const a=new Audio(DIAL_SRC);a.volume=.44;return a;});
let pi=0, muted=false;
function ding(){if(muted)return;const a=pool[pi++%4];a.currentTime=0;a.play().catch(()=>{});}

/* ══ Timer State ══ */
let pomoOn=false, isBreak=false, pomSess=0;
const W=25*60, B=5*60, LB=15*60;
let secs=25*60, iv=null;
let drag=false, lastMin=25;
const DECAY=0.68, THRESH=1.8;
let vel=0, lastA=null, lastT=null, raf=null;

/* ══ Clock Face ══ */
const cx=120,cy=120,tR=104,tO=86,tMaj=74,tMin=78,aR=86;
const tg=document.getElementById("ticks");
for(let i=0;i<60;i++){
  const a=(i*6-90)*Math.PI/180, maj=i%5===0, iR=maj?tMaj:tMin;
  const ln=document.createElementNS("http://www.w3.org/2000/svg","line");
  ln.setAttribute("x1",cx+iR*Math.cos(a));ln.setAttribute("y1",cy+iR*Math.sin(a));
  ln.setAttribute("x2",cx+tO*Math.cos(a));ln.setAttribute("y2",cy+tO*Math.sin(a));
  ln.setAttribute("class",maj?"maj":"min");tg.appendChild(ln);
  if(maj){
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",cx+tR*Math.cos(a));t.setAttribute("y",cy+tR*Math.sin(a));
    t.setAttribute("class","lbl");t.textContent=i===0?"0":i;tg.appendChild(t);
  }
}

/* ══ Draw ══ */
const sliceEl=document.getElementById("sliceEl");
const knobEl=document.getElementById("knob");
const digiEl=document.getElementById("digi");
function draw(s){
  digiEl.textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(Math.floor(s%60)).padStart(2,"0");
  knobEl.style.transform=`translate(-50%,-50%) rotate(${(s/3600)*360}deg)`;
  sliceEl.className="slice"+(isBreak?" brk":"");
  if(s<=0){sliceEl.setAttribute("d","");return;}
  if(s>=3600){sliceEl.setAttribute("d",`M ${cx} ${cy-aR} A ${aR} ${aR} 0 1 1 ${cx-.001} ${cy-aR} Z`);return;}
  const r=((s/3600)*360-90)*Math.PI/180;
  sliceEl.setAttribute("d",`M ${cx} ${cy} L ${cx} ${cy-aR} A ${aR} ${aR} 0 ${s>1800?1:0} 1 ${cx+aR*Math.cos(r)} ${cy+aR*Math.sin(r)} Z`);
}
draw(secs);

function updDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById("d"+i);
    d.className="dot"+(i<pomSess?" done":i===pomSess?" cur":"");
  }
}

if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();
function notify(t,b){if("Notification"in window&&Notification.permission==="granted")new Notification(t,{body:b});}

/* ══ Dial ══ */
function getAngle(e){
  const r=document.getElementById("clock").getBoundingClientRect();
  const px=e.touches?e.touches[0].clientX:e.clientX;
  const py=e.touches?e.touches[0].clientY:e.clientY;
  let d=Math.atan2(py-(r.top+r.height/2),px-(r.left+r.width/2))*180/Math.PI+90;
  if(d<0)d+=360; return d;
}
function applyAngle(deg){
  let m=Math.round((deg/360)*60);
  if(m===0&&secs>45*60)m=60;
  if(m===60&&secs<15*60)m=0;
  m=Math.max(0,Math.min(60,m));
  if(m!==lastMin){ding();lastMin=m;}
  secs=m*60;draw(secs);
}
function momentum(){
  if(Math.abs(vel)<THRESH){vel=0;return;}
  vel*=DECAY;
  let newDeg=(secs/3600)*360+vel;
  if(newDeg<0)newDeg=0;if(newDeg>=360)newDeg=359.9;
  applyAngle(newDeg);raf=requestAnimationFrame(momentum);
}
function onStart(e){drag=true;vel=0;if(raf)cancelAnimationFrame(raf);if(iv)pause();lastA=getAngle(e);lastT=Date.now();applyAngle(lastA);}
function onMove(e){
  if(!drag)return;e.preventDefault();
  const now=Date.now(),d=getAngle(e);
  if(lastA!==null){
    let delta=d-lastA;
    if(delta>180)delta-=360;if(delta<-180)delta+=360;
    if(secs>=3600&&delta>0){lastA=d;lastT=now;return;}
    if(secs<=0&&delta<0){lastA=d;lastT=now;return;}
    vel=(delta*0.62)/Math.max(1,now-lastT)*16;
  }
  lastA=d;lastT=now;applyAngle(d);
}
function onEnd(){if(!drag)return;drag=false;raf=requestAnimationFrame(momentum);}
const clk=document.getElementById("clock");
clk.addEventListener("mousedown",onStart);
window.addEventListener("mousemove",onMove);
window.addEventListener("mouseup",onEnd);
clk.addEventListener("touchstart",onStart,{passive:false});
window.addEventListener("touchmove",onMove,{passive:false});
window.addEventListener("touchend",onEnd);
document.getElementById("minusBtn").addEventListener("click",()=>{secs=Math.max(0,secs-60);lastMin=Math.round(secs/60);ding();draw(secs);});
document.getElementById("plusBtn").addEventListener("click",()=>{secs=Math.min(3600,secs+60);lastMin=Math.round(secs/60);ding();draw(secs);});

/* ══ Timer ══ */
function onZero(){
  autoAdvanceStage(1, 2); // 진행 → 완료
  if(!muted){alarm.currentTime=0;alarm.play().catch(()=>{});setTimeout(()=>{alarm.pause();alarm.currentTime=0;},9000);}
  if(pomoOn)handlePomo();else notify("⏰ 타이머 종료!","수고했어요! 👏");
}
function start(){
  if(iv||secs<=0)return;
  alarm.load();
  // 타이머 시작: 집중(0) 첫 항목 → 진행(1) (진행 중 없을 때만)
  if(!isBreak && getItemsByStage(1).length===0) autoAdvanceStage(0, 1);
  document.getElementById("startBtn").classList.add("on");
  document.getElementById("startBtn").textContent="PAUSE";
  iv=setInterval(()=>{secs--;draw(secs);if(secs<=0){clearInterval(iv);iv=null;document.getElementById("startBtn").classList.remove("on");document.getElementById("startBtn").textContent="START";onZero();}},1000);
}
function pause(){
  clearInterval(iv);iv=null;
  document.getElementById("startBtn").classList.remove("on");
  document.getElementById("startBtn").textContent="START";
}
document.getElementById("startBtn").addEventListener("click",()=>iv?pause():start());
document.getElementById("resetBtn").addEventListener("click",()=>{
  pause();alarm.pause();alarm.currentTime=0;
  if(pomoOn){isBreak=false;pomSess=0;secs=W;document.getElementById("modeLbl").textContent="집중 시간";document.getElementById("modeLbl").className="mode-lbl";updDots();}
  else secs=25*60;
  lastMin=Math.round(secs/60);draw(secs);
});

/* ══ Pomodoro ══ */
function handlePomo(){
  if(isBreak){
    isBreak=false;secs=W;
    document.getElementById("modeLbl").textContent="집중 시간";
    document.getElementById("modeLbl").className="mode-lbl";
    notify("✅ 휴식 종료!","다시 집중! 💪");
  }else{
    pomSess=(pomSess+1)%4;updDots();isBreak=true;
    secs=pomSess===0?LB:B;
    document.getElementById("modeLbl").textContent=pomSess===0?"긴 휴식 (15분)":"짧은 휴식 (5분)";
    document.getElementById("modeLbl").className="mode-lbl brk";
    notify("🎉 집중 완료!",`${pomSess===0?"15분":"5분"} 쉬세요 ☕`);
  }
  lastMin=Math.round(secs/60);draw(secs);start();
}
document.getElementById("pomoBtn").addEventListener("click",()=>{
  pomoOn=!pomoOn;
  document.getElementById("pomoBtn").classList.toggle("on",pomoOn);
  document.getElementById("dotsEl").style.display=pomoOn?"flex":"none";
  if(pomoOn){
    pause();isBreak=false;pomSess=0;secs=W;lastMin=25;
    document.getElementById("modeLbl").textContent="집중 시간";
    document.getElementById("modeLbl").className="mode-lbl";
    updDots();draw(secs);
  }else{
    document.getElementById("modeLbl").textContent="";
    document.getElementById("modeLbl").className="mode-lbl";
  }
});

/* ══ Theme / Sound ══ */
document.getElementById("themeBtn").addEventListener("click",()=>{
  document.body.classList.toggle("dark");
  document.getElementById("themeBtn").textContent=document.body.classList.contains("dark")?"Light Mode":"Dark Mode";
});
document.getElementById("soundBtn").addEventListener("click",()=>{
  muted=!muted;
  document.getElementById("soundBtn").classList.toggle("muted",muted);
  document.getElementById("soundBtn").textContent=muted?"🔕 알람":"🔔 알람";
  if(muted){alarm.pause();alarm.currentTime=0;}
});

/* ══════════════════════════
   TODO + STAGE LOGIC
══════════════════════════ */

const STAGE_LABELS = ['집중','진행','완료'];
let activeFilter = 'all';

function getItemsByStage(s){
  return [...document.querySelectorAll('#todoList .item')].filter(el=>el.dataset.stage==s);
}

/* Auto-advance: first item of fromStage → toStage */
function autoAdvanceStage(fromStage, toStage){
  const targets = toStage === 2
    ? getItemsByStage(fromStage)          // all진행 → 완료
    : getItemsByStage(fromStage).slice(0,1); // 첫 집중만 → 진행
  targets.forEach(li => {
    setStage(li, toStage);
    flashItem(li);
  });
  updateAll();
}

function flashItem(li){
  li.classList.remove('flash');
  void li.offsetWidth;
  li.classList.add('flash');
  li.addEventListener('animationend',()=>li.classList.remove('flash'),{once:true});
}

function setStage(li, s){
  li.dataset.stage = s;
  li.className = `item stage-${s}`;
  // badge
  const badge = li.querySelector('.badge');
  badge.textContent = STAGE_LABELS[s];
  badge.className = `badge s${s}`;
  // adv button label
  const adv = li.querySelector('.adv-btn');
  if(s < 2){ adv.textContent = s===0 ? '진행 →' : '완료 ✓'; adv.style.display=''; }
  else { adv.style.display='none'; }
  applyFilter(li);
}

function applyFilter(li){
  if(activeFilter==='all') li.classList.remove('hidden');
  else li.classList.toggle('hidden', li.dataset.stage != activeFilter);
}

/* Update counts + progress */
function updateAll(){
  const items=[...document.querySelectorAll('#todoList .item')];
  const total=items.length;
  const counts=[0,0,0];
  items.forEach(li=>counts[+li.dataset.stage]++);
  document.getElementById('cnt0').textContent=counts[0];
  document.getElementById('cnt1').textContent=counts[1];
  document.getElementById('cnt2').textContent=counts[2];
  document.getElementById('cntAll').textContent=total;
  const pct=total===0?0:Math.round((counts[2]/total)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progVal').textContent=`${counts[2]} / ${total} 완료 (${pct}%)`;
}

/* Add todo */
function addTodo(text='', stage=0){
  const val = text || document.getElementById('todoIn').value.trim();
  if(!val) return;
  const li = document.createElement('li');
  li.className=`item stage-${stage}`;
  li.dataset.stage=stage;
  li.innerHTML=`
    <span class="badge s${stage}">${STAGE_LABELS[stage]}</span>
    <span class="itxt">${val}</span>
    <button class="adv-btn">${stage===0?'진행 →':stage===1?'완료 ✓':''}</button>
    <button class="del">×</button>
  `;
  if(stage===2) li.querySelector('.adv-btn').style.display='none';

  /* Advance button */
  li.querySelector('.adv-btn').addEventListener('click', e=>{
    e.stopPropagation();
    const cur=+li.dataset.stage;
    if(cur<2){ setStage(li,cur+1); updateAll(); }
  });

  /* Click row (toggle 집중↔진행) */
  li.querySelector('.itxt').addEventListener('click',()=>{
    const cur=+li.dataset.stage;
    if(cur<2){ setStage(li,cur+1); updateAll(); }
  });

  /* Delete */
  li.querySelector('.del').addEventListener('click',()=>{
    li.style.opacity='0'; li.style.transform='translateY(8px)';
    setTimeout(()=>{li.remove();updateAll();},200);
  });

  applyFilter(li);
  document.getElementById('todoList').appendChild(li);
  if(!text) document.getElementById('todoIn').value='';
  updateAll();
}

document.getElementById('todoIn').addEventListener('keypress',e=>{
  if(e.key==='Enter'){e.preventDefault();addTodo();}
});

/* Stage header filter */
document.querySelectorAll('.sh-cell').forEach(cell=>{
  cell.addEventListener('click',()=>{
    const f = cell.dataset.filter;
    activeFilter = (activeFilter===f) ? 'all' : f; // toggle
    document.querySelectorAll('.sh-cell').forEach(c=>c.classList.toggle('active-filter', c.dataset.filter===activeFilter));
    document.querySelectorAll('#todoList .item').forEach(li=>applyFilter(li));
  });
});

/* Sample data */
addTodo('오늘 집중 목표 작성하기', 2);
addTodo('뽀모도로 타이머 테스트하기', 0);
addTodo('칸반 기능 써보기', 0);
