<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Visual Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-main: #111111;
            --text-muted: #888888;
            /* ✅ 진한 검정 케이스 */
            --case-color: #0d0d0d;
            --face-color: #ffffff;
            --timer-red: #ea3323;
            --tick-major: #111111;
            --tick-minor: #a0a0a0;
            --knob-bg: #ffffff;
            --btn-bg: #e4e4e7;
            --btn-hover: #d4d4d8;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --case-color: #050505;
            --face-color: #27272a;
            --timer-red: #ef4444;
            --tick-major: #f4f4f5;
            --tick-minor: #52525b;
            --knob-bg: #3f3f46;
            --btn-bg: #27272a;
            --btn-hover: #3f3f46;
            --input-bg: #1e1e1e;
            --input-border: #3f3f46;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: var(--transition);
            box-sizing: border-box;
            user-select: none;
        }

        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: 2px solid var(--case-color);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .theme-toggle:hover {
            background-color: var(--case-color);
            color: var(--face-color);
        }

        /* ✅ 조금 작아진 시계 + 진한 검정 테두리 + 3D 원근감 베젤 */
        .timer-container {
            position: relative;
            width: 100%;
            max-width: 400px; /* 500px → 400px */
            aspect-ratio: 1 / 1;

            background-color: var(--face-color);

            /* 두꺼운 진검정 케이스 테두리 */
            border: 22px solid var(--case-color);
            border-radius: 22%;

            /*
             * ✅ 3D 원근감 베젤 효과:
             *  - 첫 번째 inset: 테두리 안쪽에 얇은 하이라이트 선(빛 반사)
             *  - 두 번째 inset: 그 안쪽에 어두운 그림자 링(깊이감)
             *  - 외부 그림자로 띄워진 느낌 완성
             */
            box-shadow:
                inset 0 0 0 2px rgba(255, 255, 255, 0.18),   /* ① 안쪽 밝은 선 */
                inset 0 0 0 5px rgba(0, 0, 0, 0.35),          /* ② 안쪽 어두운 링 */
                inset 0 6px 14px rgba(0, 0, 0, 0.10),         /* ③ 아래쪽 내부 음영 */
                0 24px 50px rgba(0, 0, 0, 0.18),               /* ④ 외부 드롭섀도 */
                0 4px 10px rgba(0, 0, 0, 0.10);

            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            cursor: grab;
            margin-top: 10px;
            margin-bottom: 44px;
        }
        .timer-container:active { cursor: grabbing; }

        svg { width: 100%; height: 100%; }

        .time-slice { fill: var(--timer-red); transition: fill 0.3s; }

        .tick { stroke-linecap: round; transition: stroke 0.3s; }
        .tick.major { stroke: var(--tick-major); stroke-width: 3.5; }
        .tick.minor { stroke: var(--tick-minor); stroke-width: 2; }

        .time-text {
            font-size: 15px;
            font-weight: 700;
            fill: var(--text-main);
            text-anchor: middle;
            dominant-baseline: central;
            transition: fill 0.3s;
            pointer-events: none;
        }

        .knob-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            background-color: var(--knob-bg);
            border-radius: 50%;
            pointer-events: none;
            box-shadow:
                0 6px 12px rgba(0,0,0,0.15),
                0 0 0 1px rgba(0,0,0,0.05),
                inset 0 2px 4px rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .knob-pointer {
            width: 6px;
            height: 14px;
            background-color: var(--text-muted);
            border-radius: 4px;
            margin-top: 6px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }

        /* ✅ 컨트롤 버튼 */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 50px;
        }

        .btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .btn:hover { background-color: var(--btn-hover); }
        .btn:active { transform: scale(0.95); }

        /* ✅ 스타트 버튼: 기본 연두색 */
        .btn-start {
            background-color: #bbf7d0; /* 연두색 */
            color: #14532d;
            box-shadow: 0 2px 8px rgba(34,197,94,0.15);
        }
        .btn-start:hover {
            background-color: #86efac;
        }

        /* ✅ 실행 중(PAUSE): 빨간색 */
        .btn-start.running {
            background-color: #ef4444;
            color: #ffffff;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.35);
        }
        .btn-start.running:hover {
            background-color: #dc2626;
        }

        .digital-time {
            font-size: 32px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 0 15px;
            color: var(--text-main);
            transition: var(--transition);
        }

        /* 투두 */
        .todo-section {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .todo-input-wrapper {
            position: relative;
            display: flex;
            width: 100%;
        }

        .todo-input {
            width: 100%;
            padding: 18px 24px;
            font-size: 16px;
            border: 2px solid var(--input-border);
            border-radius: 16px;
            background-color: var(--input-bg);
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .todo-input:focus {
            border-color: var(--timer-red);
            box-shadow: 0 4px 15px rgba(234, 51, 35, 0.1);
        }

        .todo-list {
            list-style: none;
            padding: 0; margin: 0;
            display: flex; flex-direction: column; gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            border-radius: 16px;
            background-color: var(--input-bg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .todo-item:hover {
            border-color: var(--input-border);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .todo-checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .todo-checkbox:checked {
            background-color: var(--timer-red);
            border-color: var(--timer-red);
        }
        .todo-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 7px; top: 3px;
            width: 5px; height: 11px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .todo-text {
            flex: 1; font-size: 16px; color: var(--text-main);
            cursor: pointer; transition: var(--transition);
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through; color: var(--text-muted);
        }

        .todo-delete {
            background: none; border: none; color: var(--text-muted);
            font-size: 22px; cursor: pointer; opacity: 0;
            transition: var(--transition); padding: 4px;
        }
        .todo-item:hover .todo-delete { opacity: 1; }
        .todo-delete:hover { color: var(--timer-red); }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">Dark Mode</button>

    <div class="timer-container" id="timerArea">
        <svg viewBox="0 0 240 240" id="clockSvg">
            <path class="time-slice" id="timeSlice" d=""></path>
            <g id="ticksGroup"></g>
        </svg>
        <div class="knob-wrapper" id="knobWrapper">
            <div class="knob-pointer"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn">START</button>
        <div class="digital-time" id="digitalTime">25:00</div>
        <button class="btn" id="resetBtn">RESET</button>
    </div>

    <div class="todo-section">
        <div class="todo-input-wrapper">
            <input type="text" id="todoInput" class="todo-input" placeholder="이번 뽀모도로에 집중할 목표 입력...">
        </div>
        <ul class="todo-list" id="todoList"></ul>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            themeToggle.textContent = document.body.classList.contains('dark-mode') ? 'Light Mode' : 'Dark Mode';
        });

        const ticksGroup = document.getElementById('ticksGroup');
        const cx = 120, cy = 120;
        const textRadius = 104;
        const tickOuter = 86;
        const tickMajorInner = 74;
        const tickMinorInner = 78;
        const arcRadius = 86;

        for (let i = 0; i < 60; i++) {
            const angleDeg = (i * 6) - 90;
            const angleRad = angleDeg * (Math.PI / 180);
            const isMajor = i % 5 === 0;
            const innerR = isMajor ? tickMajorInner : tickMinorInner;
            const x1 = cx + innerR * Math.cos(angleRad);
            const y1 = cy + innerR * Math.sin(angleRad);
            const x2 = cx + tickOuter * Math.cos(angleRad);
            const y2 = cy + tickOuter * Math.sin(angleRad);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("class", isMajor ? "tick major" : "tick minor");
            ticksGroup.appendChild(line);
            if (isMajor) {
                const tx = cx + textRadius * Math.cos(angleRad);
                const ty = cy + textRadius * Math.sin(angleRad);
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", tx); text.setAttribute("y", ty);
                text.setAttribute("class", "time-text");
                text.textContent = i === 0 ? "0" : i;
                ticksGroup.appendChild(text);
            }
        }

        const timerArea = document.getElementById('timerArea');
        const timeSlice = document.getElementById('timeSlice');
        const knobWrapper = document.getElementById('knobWrapper');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const digitalTime = document.getElementById('digitalTime');

        let totalSeconds = 25 * 60;
        let timerInterval = null;
        let isDragging = false;

        function updateTimerVisuals(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
            digitalTime.textContent = `${mins}:${secs}`;
            const percentage = seconds / 3600;
            const degrees = percentage * 360;
            knobWrapper.style.transform = `translate(-50%, -50%) rotate(${degrees}deg)`;
            if (seconds <= 0) { timeSlice.setAttribute("d", ""); return; }
            if (seconds >= 3600) seconds = 3599.9;
            const rad = ((seconds / 3600) * 360 - 90) * (Math.PI / 180);
            const endX = cx + arcRadius * Math.cos(rad);
            const endY = cy + arcRadius * Math.sin(rad);
            const largeArcFlag = seconds > 1800 ? 1 : 0;
            const d = `M ${cx} ${cy} L ${cx} ${cy - arcRadius} A ${arcRadius} ${arcRadius} 0 ${largeArcFlag} 1 ${endX} ${endY} Z`;
            timeSlice.setAttribute("d", d);
        }

        updateTimerVisuals(totalSeconds);

        function calculateTimeFromEvent(e) {
            const rect = timerArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let radians = Math.atan2(clientY - centerY, clientX - centerX);
            let degrees = (radians * 180 / Math.PI) + 90;
            if (degrees < 0) degrees += 360;
            let minutes = Math.round((degrees / 360) * 60);
            if (minutes === 0 && totalSeconds > 45 * 60) minutes = 60;
            else if (minutes === 60 && totalSeconds < 15 * 60) minutes = 0;
            totalSeconds = minutes * 60;
            updateTimerVisuals(totalSeconds);
        }

        const handleDragStart = (e) => {
            isDragging = true;
            if (timerInterval) pauseTimer();
            calculateTimeFromEvent(e);
        };
        const handleDragMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            calculateTimeFromEvent(e);
        };
        const handleDragEnd = () => { isDragging = false; };

        timerArea.addEventListener('mousedown', handleDragStart);
        window.addEventListener('mousemove', handleDragMove);
        window.addEventListener('mouseup', handleDragEnd);
        timerArea.addEventListener('touchstart', handleDragStart, { passive: false });
        window.addEventListener('touchmove', handleDragMove, { passive: false });
        window.addEventListener('touchend', handleDragEnd);

        function startTimer() {
            if (timerInterval || totalSeconds <= 0) return;
            startBtn.classList.add('running');
            startBtn.textContent = 'PAUSE';
            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimerVisuals(totalSeconds);
                if (totalSeconds <= 0) {
                    pauseTimer();
                    alert("시간이 완료되었습니다! 👏");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            startBtn.classList.remove('running');
            startBtn.textContent = 'START';
        }

        startBtn.addEventListener('click', () => {
            if (timerInterval) pauseTimer();
            else startTimer();
        });

        resetBtn.addEventListener('click', () => {
            pauseTimer();
            totalSeconds = 25 * 60;
            updateTimerVisuals(totalSeconds);
        });

        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');

        function addTodo(text = '', isCompleted = false) {
            const val = text || todoInput.value.trim();
            if (!val) return;
            const li = document.createElement('li');
            li.className = `todo-item ${isCompleted ? 'completed' : ''}`;
            li.innerHTML = `
                <input type="checkbox" class="todo-checkbox" ${isCompleted ? 'checked' : ''}>
                <span class="todo-text">${val}</span>
                <button class="todo-delete" title="삭제">×</button>
            `;
            const checkbox = li.querySelector('.todo-checkbox');
            checkbox.addEventListener('change', () => {
                li.classList.toggle('completed', checkbox.checked);
            });
            li.querySelector('.todo-text').addEventListener('click', () => {
                checkbox.checked = !checkbox.checked;
                li.classList.toggle('completed', checkbox.checked);
            });
            li.querySelector('.todo-delete').addEventListener('click', () => {
                li.style.transform = 'translateY(10px)';
                li.style.opacity = '0';
                setTimeout(() => li.remove(), 300);
            });
            todoList.appendChild(li);
            if (!text) todoInput.value = '';
        }

        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); addTodo(); }
        });

        addTodo("수정된 UI 디자인 테스트하기", true);
        addTodo("뽀모도로 타이머 작동 확인하기");
    </script>
</body>
</html>
